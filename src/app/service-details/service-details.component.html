<section id="tracking" class="py-16 bg-gray-100">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="grid md:grid-cols-2 gap-12 items-center">
      <div>
        <h2 class="text-3xl font-bold text-gray-900 mb-4">{{ service.name }}</h2>
        <p class="text-gray-700 mb-6">{{ service.priceRange }}</p>

        <div class="bg-white rounded-xl p-6 shadow-sm">
          <h3 class="font-medium mb-4">{{ service.subDescription }}</h3>
          <div class="flex">
            <div class="flex flex-col items-center mr-4">
              <div class="rounded-full bg-primary w-8 h-8 flex items-center justify-center">
                <i class="fas fa-plane-departure text-white text-sm"></i>
              </div>
              <div class="w-0.5 h-16 bg-gray-200 my-1"></div>
            </div>

            <div class="pb-6">
              <p class="font-medium">Description</p>
              <p class="text-sm mt-1">{{ service.description }}</p>
              <br>
              <div class="grid text-xs text-gray-500"
                   [ngClass]="'grid-cols-' + service.options.length">
                <div *ngFor="let option of service.options; let i = index" class="text-center">
                  <div>{{ option }}</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="grid gap-4"
           [ngClass]="{
       'grid-cols-1': img.length === 1,
       'grid-cols-2': img.length === 2,
       'grid-cols-3': img.length >= 3
     }">

        <div *ngFor="let image of img">
          <img [src]="image.imageUrl"
               alt="Service Image"
               class="w-full h-64 object-cover rounded-xl shadow-sm">
        </div>

      </div>
    </div>
  </div>
</section>
