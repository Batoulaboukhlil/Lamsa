<section id="contact" class="py-20 relative section-reveal">
  <div class="max-w-7xl mx-auto px-6 pl-8">
    <div class="text-center mb-16">
      <h2 class="text-5xl font-bold mb-6">
          <span class="bg-gradient-to-r from-yellow-400 to-red-400 bg-clip-text text-transparent">
            Contact Us
          </span>
      </h2>
      <p class="text-xl text-gray-400 max-w-2xl mx-auto">
        If you have any questions, inquiries, or would like to discuss a project, feel free to reach out to us. We're here to help and look forward to connecting with you!
      </p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 pl-16">
      <!-- Contact Form -->
      <div class="holographic-card p-8 rounded-2xl pl-8">
        <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-6" id="contactForm">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label class="block text-sm font-medium text-gray-300 mb-2">Name</label>
              <input type="text" class="w-full bg-white/5 border border-black/10 rounded-lg px-4 py-3 text-white placeholder-gray-400 focus:border-cyan-400 focus:ring-2 focus:ring-cyan-400/20 transition-all duration-300" placeholder="Andika amazina yawe">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-300 mb-2">Email</label>
              <input type="email" class="w-full bg-white/5 border border-black/10 rounded-lg px-4 py-3 text-white placeholder-gray-400 focus:border-cyan-400 focus:ring-2 focus:ring-cyan-400/20 transition-all duration-300" placeholder="email@example.com">
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-300 mb-2">Service</label>
            <select class="w-full bg-white/5 border border-black/10 rounded-lg px-4 py-3 text-white focus:border-cyan-400 focus:ring-2 focus:ring-cyan-400/20 transition-all duration-300">
              <option value="">****</option>
              <option value="ai">****</option>
              <option value="vr">****</option>
              <option value="blockchain">****</option>
              <option value="iot">****</option>
              <option value="quantum">****</option>
              <option value="metaverse">****</option>
            </select>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-300 mb-2">Message</label>
            <textarea rows="4" class="w-full bg-white/5 border border-black/10 rounded-lg px-4 py-3 text-white placeholder-gray-400 focus:border-cyan-400 focus:ring-2 focus:ring-cyan-400/20 transition-all duration-300" placeholder="Add your message here...."></textarea>
          </div>

          <button type="submit" class="magnetic-button w-full bg-gradient-to-r from-cyan-500 to-purple-500 px-8 py-4 rounded-lg text-white font-semibold hover:scale-105 transition-all duration-300">
            Send <i class="fas fa-paper-plane ml-2"></i>
          </button>
        </form>
      </div>

      <!-- Contact Info -->
      <div class="space-y-6 bg-black p-2 rounded-2xl pl-8">
        <div class="holographic-card p-6  rounded-xl">
          <div class="flex items-center space-x-4">
            <div class="w-12 h-12 bg-gradient-to-r from-cyan-500 to-blue-500 rounded-full flex items-center justify-center">
              <i class="fas fa-envelope text-white"></i>
            </div>
            <div>
              <h3 class="text-lg font-semibold text-cyan-400">Email</h3>
              <p class="text-gray-400">****</p>
            </div>
          </div>
        </div>

        <div class="holographic-card p-6 rounded-xl">
          <div class="flex items-center space-x-4">
            <div class="w-12 h-12 bg-gradient-to-r from-purple-500 to-pink-500 rounded-full flex items-center justify-center">
              <i class="fas fa-phone text-white"></i>
            </div>
            <div>
              <h3 class="text-lg font-semibold text-purple-400">GSM</h3>
              <p class="text-gray-400">****</p>
            </div>
          </div>
        </div>

        <div class="holographic-card p-6 rounded-xl">
          <div class="flex items-center space-x-4">
            <div class="w-12 h-12 bg-gradient-to-r from-green-500 to-emerald-500 rounded-full flex items-center justify-center">
              <i class="fas fa-map-marker-alt text-white"></i>
            </div>
            <div>
              <h3 class="text-lg font-semibold text-green-400">Adress</h3>
              <p class="text-gray-400">****<br>****</p>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</section>
