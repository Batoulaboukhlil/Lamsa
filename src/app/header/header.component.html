<header class="hero relative overflow-hidden">

  <!-- Background Video -->
  <video autoplay muted loop
         class="absolute top-0 left-0 w-full h-full object-cover -z-10">
    <source src="hero.mp4" type="video/mp4">
  </video>

  <!-- Dark Overlay -->
  <div class="absolute inset-0 bg-black/50 -z-10"></div>

  <!-- Navbar -->
  <nav [class.scrolled]="scrolled"
       class="glass-morphism w-full z-50 transition-all duration-500 py-4"
       id="navbar">

    <div class="max-w-7xl mx-auto px-6">
      <div class="flex justify-between items-center">

        <div class="flex items-center space-x-4">
          <div class="text-2xl font-bold bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent hover:scale-110 transition-transform duration-300">
            <a href="#home" class="flex items-center">
              <span class="animate-bounce mr-2">🚀</span>
              <span class="typing-animation">Lamsa</span>
            </a>
          </div>
        </div>

        <div class="hidden lg:flex items-center space-x-8">
          <a href="#home" class="text-white">Home</a>
          <a routerLink="/services" class="text-white">Services</a>
          <a routerLink="/about" class="text-white">About Us</a>
          <a routerLink="/contact" class="text-white">Contact</a>
        </div>

      </div>
    </div>
  </nav>

</header>
