<div  (click)="goToDetails(service)"
      class="bg-black border morphing-card holographic-card p-8 rounded-2xl group cursor-pointer">
  <div class="flex items-center justify-between mb-4">
    <h3 class="text-2xl font-bold text-cyan-400">
      {{ service.name }}
    </h3>

    <img
      [src]="service.logo"
      alt="Service logo"
      class="w-16 h-16 rounded-2xl object-contain"
    />
  </div>
  <p class="text-gray-400 mb-6">{{ service.description }}</p>
  <div class="flex flex-wrap gap-2 mb-6">
    <span class="px-3 py-1 bg-cyan-500/20 text-cyan-400 rounded-full text-sm">{{ service.priceRange }}</span>
  </div>
</div>
